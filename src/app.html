<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			try {
				var m = document.cookie.match(/of_colormode=([^;]+)/);
				document.documentElement.setAttribute('data-mode', m ? decodeURIComponent(m[1]) : 'dark');
			} catch(e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
